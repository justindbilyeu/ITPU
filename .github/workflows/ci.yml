name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: Tests (ubuntu / py${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.10", "3.11"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: "pip"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install pytest numpy scipy scikit-learn matplotlib

      - name: Run tests
        run: |
          pytest -q -m "not slow"
