name: Profile BCI Workload

on:
  workflow_dispatch:

jobs:
  profile:
    name: BCI workload profile (ubuntu / py3.11)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run profiling script
        run: python profile_bci_workload.py

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: bci-profile-results
          path: profile_results.txt
          retention-days: 7
